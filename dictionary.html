            document.getElementById('wordCount').innerText = masterData.length.toLocaleString('si-LK');
            createAlphabetIndex();
        }
    });




    const sinhalaLetters = ["අ", "ආ", "ඇ", "ඈ", "ඉ", "ඊ", "උ", "ඌ", "එ", "ඒ", "ඔ", "ඕ", "ක", "ග", "ච", "ජ", "ට", "ඩ", "ණ", "ත", "ද", "න", "ප", "බ", "ම", "ය", "ර", "ල", "ව", "ස", "හ"];
    function createAlphabetIndex() {
        const container = document.getElementById('alphabetIndex');
        container.innerHTML = "";
        sinhalaLetters.forEach(letter => {
            let btn = document.createElement('button');
            btn.className = 'letter-btn'; btn.innerText = letter;
            btn.onclick = () => { document.getElementById('searchInput').value = letter; initSearch(true); };
            container.appendChild(btn);
        });
    }

    function initSearch(isIndexSearch = false) {
        let input = document.getElementById('searchInput').value.trim().toLowerCase();
        let resultDiv = document.getElementById('results');
        if (input.length < 1) { resultDiv.innerHTML = ""; return; }

        let filtered = masterData.filter(item => {
            const categoryMatch = (currentCategory === 'all' || item.category === currentCategory);
            let wordMatch = item.word.toLowerCase().startsWith(input);
            return categoryMatch && wordMatch;
        });

        resultDiv.innerHTML = "";
        filtered.slice(0, 50).forEach(item => {
            let index = masterData.indexOf(item);
            let editBtnHtml = isAdmin ? `<button class="edit-btn" onclick="openEditModal(${index})">✏️ Edit</button>` : '';
            
            let scientificHtml = item.scientific ? `<div style="font-style: italic; font-weight: bold; color: #7f8c8d; margin-bottom: 8px;">(${item.scientific})</div>` : '';
            let imageHtml = item.image ? `<img src="${item.image}" alt="${item.word}" class="word-image">` : '';
            
            resultDiv.innerHTML += `<div class="word-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <span class="word-title" style="margin-bottom:0;">${item.word}</span>
                    ${editBtnHtml}
                </div>
                ${scientificHtml}
                <div class="word-content-wrapper" style="margin-top:10px;">
                    ${imageHtml}
                    <div class="meaning" style="flex: 1;">${item.meaning}</div>
                </div>
            </div>`;
        });
    }

    function filterByCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentCategory = cat;
        initSearch();
    }

    function exitApp() { if (confirm("ඔබට මෙම ශබ්දකෝෂයෙන් පිටවීමට අවශ්‍යද?")) { window.close(); window.location.href = "about:blank"; } }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function changeFontSize(delta) { 
        const root = document.querySelector(':root');
        const cur = parseFloat(getComputedStyle(root).getPropertyValue('--content-font-size'));
        root.style.setProperty('--content-font-size', (cur + delta) + 'px');
    }

    // --- Admin Edit Logic ---
    let isAdmin = false;

    function promptAdminLogin() {
        if (isAdmin) {
            alert("ඔබ දැනටමත් Admin ලෙස ලොග් වී ඇත.");
            return;
        }
        let pass = prompt("Admin Password එක ඇතුළත් කරන්න:");
        if (pass === "Weda2026") {
            isAdmin = true;
            alert("Admin ලොගින් සාර්ථකයි! දැන් ඔබට වචන Edit කළ හැක.");
            initSearch(); 
        } else if (pass !== null && pass !== "") {
            alert("පාස්වර්ඩ් එක වැරදියි!");
        }
    }

    let currentEditItemIndex = -1;

    function openEditModal(index) {
        currentEditItemIndex = index;
        let item = masterData[index];
        
        document.getElementById('editOriginalWord').value = item.word;
        document.getElementById('editWordInput').value = item.word;
        document.getElementById('editMeaningInput').value = item.meaning;
        document.getElementById('editScientificInput').value = item.scientific || "";
        document.getElementById('editImageInput').value = "";
        
        let preview = document.getElementById('imagePreview');
        if (item.image) {
            preview.innerHTML = `<img src="${item.image}" style="max-width: 100%; border-radius: 5px;">`;
        } else {
            preview.innerHTML = "";
        }
        
        let catSelect = document.getElementById('editCategoryInput');
        let found = Array.from(catSelect.options).some(opt => {
            if (opt.value === item.category) { opt.selected = true; return true; }
            return false;
        });
        if (!found && item.category) {
            catSelect.add(new Option(item.category, item.category, true, true));
        }
        
        document.getElementById('editModal').style.display = "block";
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = "none";
    }

    function saveEditedWord() {
        let originalWord = document.getElementById('editOriginalWord').value;
        let newWord = document.getElementById('editWordInput').value.trim();
        let newMeaning = document.getElementById('editMeaningInput').value.trim();
        let newCategory = document.getElementById('editCategoryInput').value;
        let newScientific = document.getElementById('editScientificInput').value.trim();
        let imageInput = document.getElementById('editImageInput');
        
        if (newWord === "" || newMeaning === "") {
            alert("කරුණාකර වචනය සහ තේරුම සම්පූර්ණ කරන්න.");
            return;
        }
        
        if (window.location.protocol !== 'http:') {
            alert("Admin Edit පහසුකම භාවිතා කිරීමට කරුණාකර server.js ධාවනය කර http://localhost:3000 හරහා ඇප් එක විවෘත කරන්න.");
            return;
        }
        
        let btn = document.querySelector('#editModal button');
        btn.innerText = "Saving...";
        btn.disabled = true;
        
        if (imageInput.files.length > 0) {
            let file = imageInput.files[0];
            let reader = new FileReader();
            reader.onload = function(e) {
                let base64 = e.target.result;
                let filename = originalWord + "_" + file.name;
                
                fetch('/upload-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename, base64: base64 })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        sendUpdateRequest(originalWord, newWord, newMeaning, newCategory, newScientific, data.url, btn);
                    } else {
                        alert("Image Upload Error: " + data.message);
                        btn.innerText = "Save Changes"; btn.disabled = false;
                    }
                }).catch(err => {
                    console.error(err);
                    alert("Image Upload Failed");
                    btn.innerText = "Save Changes"; btn.disabled = false;
                });
            };
            reader.readAsDataURL(file);
        } else {
            let existingImage = (currentEditItemIndex !== -1 && masterData[currentEditItemIndex].image) ? masterData[currentEditItemIndex].image : "";
            sendUpdateRequest(originalWord, newWord, newMeaning, newCategory, newScientific, existingImage, btn);
        }
    }

    function sendUpdateRequest(orig, word, mean, cat, sci, img, btn) {
        fetch('/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ originalWord: orig, newWord: word, newMeaning: mean, newCategory: cat, newScientific: sci, newImage: img })
        })
        .then(response => response.json())
        .then(data => {
            btn.innerText = "Save Changes";
            btn.disabled = false;
            if (data.success) {
                alert(data.message);
                if (currentEditItemIndex !== -1) {
                    masterData[currentEditItemIndex].word = word;
                    masterData[currentEditItemIndex].meaning = mean;
                    masterData[currentEditItemIndex].category = cat;
                    masterData[currentEditItemIndex].scientific = sci;
                    if (img) masterData[currentEditItemIndex].image = img;
                }
                closeEditModal();
                initSearch();
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            btn.innerText = "Save Changes";
            btn.disabled = false;
            alert("සේවර් එකට සම්බන්ධ වීමට නොහැක. server.js run වෙනවද කියලා බලන්න.");
            console.error('Error:', error);
        });
    }
    // --- End Admin Edit Logic ---

    function showModal(key) { 
        currentInfoKey = key;
        document.getElementById('modalTitle').innerText = infoData[key].title; 
        document.getElementById('modalBody').innerHTML = infoData[key].body; 
        
        document.getElementById('modalBody').style.display = "block";
        document.getElementById('infoEditSection').style.display = "none";
        
        if (isAdmin) {
            document.getElementById('infoEditBtn').style.display = "block";
        } else {
            document.getElementById('infoEditBtn').style.display = "none";
        }
        
        document.getElementById('infoModal').style.display = "block"; 
    }

    function toggleInfoEdit() {
        let bodyDiv = document.getElementById('modalBody');
        let editSec = document.getElementById('infoEditSection');
        
        if (editSec.style.display === "none") {
            document.getElementById('infoEditTitle').value = infoData[currentInfoKey].title;
            document.getElementById('infoEditBody').value = infoData[currentInfoKey].body;
            bodyDiv.style.display = "none";
            editSec.style.display = "block";
        } else {
            bodyDiv.style.display = "block";
            editSec.style.display = "none";
        }
    }

    function saveInfoEdit() {
        let newTitle = document.getElementById('infoEditTitle').value.trim();
        let newBody = document.getElementById('infoEditBody').value;
        
        if (newTitle === "") {
            alert("කරුණාකර මාතෘකාව සම්පූර්ණ জ্ঞකරන්න.");
            return;
        }
        
        let btn = document.querySelector('#infoEditSection button');
        btn.innerText = "Saving...";
        btn.disabled = true;
        
        fetch('/update-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: currentInfoKey, newTitle: newTitle, newBody: newBody })
        })
        .then(response => response.json())
        .then(data => {
            btn.innerText = "Save Changes";
            btn.disabled = false;
            if (data.success) {
                alert(data.message);
                infoData[currentInfoKey].title = newTitle;
                infoData[currentInfoKey].body = newBody;
                toggleInfoEdit();
                showModal(currentInfoKey);
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(error => {
            btn.innerText = "Save Changes";
            btn.disabled = false;
            alert("සේවර් එකට සම්බන්ධ වීමට නොහැක. server.js run වෙනවද කියලා බලන්න.");
            console.error('Error:', error);
        });
    }

    function closeModal() { document.getElementById('infoModal').style.display = "none"; }
</script>
